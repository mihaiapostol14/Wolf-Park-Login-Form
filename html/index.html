<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Park Login</title>
</head>

<body>

  <div class="login">
    <div class="login__card">

      <h2 class="login__title">Login</h2>

      <form class="login__form">

        <div class="login__group">
          <i class="login__icon fa-solid fa-user"></i>
          <input class="login__input" type="text" placeholder="Username" required>
        </div>

        <div class="login__group">
          <i class="login__icon fa-solid fa-lock"></i>
          <input class="login__input password" type="password" placeholder="Password" required>
          <i class="login__toggle fa-solid fa-eye-slash"></i>
        </div>

        <button class="login__btn">Login</button>

        <div class="login__message"></div>

      </form>

      <div class="login__footer">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

    </div>
  </div>
</body>
<link rel="stylesheet" href="../css/style.css">
<script type="text/javascript" src="../js/script.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</html>
